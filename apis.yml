aid: race-entry
name: Race Entry
description: >-
  This API was designed specifically for the Director software to allow certain
  timers and directors integration into our Race Entry data with the Director.
  It provides programmatic access to events, registrations, participants, teams,
  results, check-in PINs, and club memberships, with temporary key/secret
  authentication issued via a login endpoint.
